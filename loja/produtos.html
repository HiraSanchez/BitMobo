<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0f14">
  <link rel="icon" type="image/png" href="/brand/bitmobo-mark.png">
  <title>Produtos — BitMobo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="site-header"></div>
  <main class="container page">
    <h1 class="page-title" id="page-title">Catalogo</h1>
    <p class="page-lead" id="page-lead"></p>
    <div class="toolbar">
      <label>
        Ordenar
        <select id="sort-select">
          <option value="relevance">Relevancia</option>
          <option value="price-asc">Menor preco</option>
          <option value="price-desc">Maior preco</option>
          <option value="rating">Melhor avaliacao</option>
          <option value="name">Nome A-Z</option>
        </select>
      </label>
      <span id="result-count" style="color:var(--muted);font-size:14px"></span>
    </div>
    <div id="product-grid" class="product-grid"></div>
    <div id="empty-state" class="empty" hidden>
      <p>Nenhum produto encontrado.</p>
      <a class="btn btn--primary" href="/produtos.html">Ver catalogo completo</a>
    </div>
  </main>
  <div id="site-footer"></div>
  <div id="toast" class="toast" hidden role="status"></div>
  <script type="module" src="/src/js/pages/produtos.js"></script>
</body>
</html>
