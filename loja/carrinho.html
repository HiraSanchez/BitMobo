<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0f14">
  <link rel="icon" type="image/png" href="/brand/bitmobo-mark.png">
  <title>Carrinho — BitMobo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="site-header"></div>
  <main class="container page">
    <h1 class="page-title">Carrinho de compras</h1>
    <div class="split-layout">
      <div class="panel" id="cart-list"></div>
      <aside class="panel">
        <h2 style="margin:0 0 14px;font-size:1.1rem">Resumo</h2>
        <div class="summary-line"><span>Subtotal</span><strong id="subtotal">R$ 0,00</strong></div>
        <div class="summary-line"><span>Frete</span><span>Calculado no checkout</span></div>
        <div class="summary-line total"><span>Total estimado</span><strong id="total">R$ 0,00</strong></div>
        <button type="button" class="btn btn--primary btn--block" id="btn-checkout" style="margin-top:16px" disabled>Ir para checkout</button>
        <a class="btn btn--ghost btn--block" href="/produtos.html" style="margin-top:10px">Continuar comprando</a>
      </aside>
    </div>
  </main>
  <div id="site-footer"></div>
  <script type="module" src="/src/js/pages/carrinho.js"></script>
</body>
</html>
